<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Для Хадишки ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Фон -->
    <div class="background"></div>

    <!-- Эффекты -->
    <div class="hearts"></div>
    <div class="sparkles"></div>

    <main class="container">

        <div class="card" id="card">

            <!-- Язык -->
            <div class="language">
                <button id="ruBtn" class="lang active">РУС</button>
                <button id="kzBtn" class="lang">ҚАЗ</button>
            </div>

            <!-- Котик -->
            <div class="cat">
                <img src="assets/cat.gif" alt="Котик" id="catImg">
            </div>

            <!-- Контент -->
            <div id="content">

                <h1 id="title">
                    Хадишка,
                </h1>

                <p id="subtitle">
                    Ты пойдёшь со мной на свидание? ❤️
                </p>

                <div id="buttons">

                    <button id="yesBtn" class="btn pink">
                        Да! 💖
                    </button>

                    <button id="noBtn" class="btn white">
                        Нет 🙈
                    </button>

                </div>

            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
